<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상금은동의 대시보드 관리 센터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
        details > summary {
            list-style: none;
        }
        details > summary::-webkit-details-marker {
            display: none;
        }
        details[open] summary .arrow {
            transform: rotate(180deg);
        }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <div id="sidebar-container" class="relative z-20 h-full transition-all duration-300 w-64 flex-shrink-0 bg-white">
        
        <button onclick="toggleSidebar()" class="absolute -right-3 top-1/2 transform -translate-y-1/2 w-6 h-6 bg-white border border-gray-300 rounded-full shadow-sm flex items-center justify-center text-xs text-gray-500 hover:text-teal-700 hover:border-teal-700 z-50 focus:outline-none transition-colors">
            <span id="toggle-icon">◀</span>
        </button>

        <div id="sidebar-inner" class="w-full h-full overflow-hidden border-r border-gray-200">
            <div class="w-64 h-full flex flex-col">
                <div class="p-5 border-b border-gray-200 flex-shrink-0">
                    <h1 class="text-xl font-black text-teal-800 whitespace-nowrap">📊 관리 센터</h1>
                </div>
                
                <nav id="tab-menu" class="flex-grow overflow-y-auto p-4 flex flex-col gap-2">
                    <span class="text-gray-400 text-sm whitespace-nowrap">목록 불러오는 중...</span>
                </nav>
            </div>
        </div>
    </div>

    <main class="flex-grow flex flex-col h-full relative z-10 bg-gray-50">
        <div id="welcome-message" class="flex flex-col items-center justify-center h-full text-gray-500">
            <p class="text-5xl mb-4">📂</p>
            <p class="text-lg">좌측 메뉴에서 분석 리포트를 선택해주세요.</p>
            <p class="text-sm mt-2 text-gray-400">파일명에 언더바(_)를 넣으면 자동으로 그룹이 지어집니다.</p>
            <p class="text-sm text-gray-400">예시: 마케팅_1분기리포트.html</p>
        </div>
        <iframe id="viewer" class="hidden w-full h-full border-none bg-white"></iframe>
    </main>

    <script>
        // 본인의 정보로 수정해주세요
        const USERNAME = 'Sanggoldsilver'; 
        const REPO = 'dashboards';
        const PATH = 'dashboards'; 

        // 사이드바 토글 기능 추가
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar-container');
            const inner = document.getElementById('sidebar-inner');
            const icon = document.getElementById('toggle-icon');
            
            if (sidebar.classList.contains('w-64')) {
                // 접기
                sidebar.classList.remove('w-64');
                sidebar.classList.add('w-0');
                inner.classList.remove('border-r');
                icon.innerText = '▶';
            } else {
                // 펴기
                sidebar.classList.remove('w-0');
                sidebar.classList.add('w-64');
                inner.classList.add('border-r');
                icon.innerText = '◀';
            }
        }

        async function fetchDashboards() {
            const menuContainer = document.getElementById('tab-menu');
            const viewer = document.getElementById('viewer');
            const welcome = document.getElementById('welcome-message');

            try {
                const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/${PATH}`);
                if (!response.ok) throw new Error('데이터를 불러오지 못했습니다.');
                const files = await response.json();

                menuContainer.innerHTML = '';

                const htmlFiles = files.filter(file => file.name.endsWith('.html') && file.name !== 'index.html');

                if (htmlFiles.length === 0) {
                    menuContainer.innerHTML = '<span class="text-red-500 text-sm">불러올 파일이 없습니다.</span>';
                    return;
                }

                const groupedFiles = {};
                
                htmlFiles.forEach(file => {
                    let groupName = "기본 대시보드";
                    let displayName = file.name.replace('.html', '');

                    if (displayName.includes('_')) {
                        const parts = displayName.split('_');
                        groupName = parts[0]; 
                        displayName = parts.slice(1).join('_');
                    }

                    if (!groupedFiles[groupName]) {
                        groupedFiles[groupName] = [];
                    }
                    groupedFiles[groupName].push({ name: displayName, path: file.path });
                });

                for (const [group, items] of Object.entries(groupedFiles)) {
                    const details = document.createElement('details');
                    details.className = 'group';
                    details.open = true; 

                    const summary = document.createElement('summary');
                    summary.className = 'cursor-pointer font-bold text-gray-700 py-2 px-3 bg-gray-100 rounded-lg hover:bg-gray-200 transition flex justify-between items-center whitespace-nowrap';
                    summary.innerHTML = `${group} <span class="arrow transition-transform duration-200 text-xs">▼</span>`;

                    const itemContainer = document.createElement('div');
                    itemContainer.className = 'pl-2 mt-1 flex flex-col gap-1 border-l-2 border-gray-100 ml-2 mb-3';

                    items.forEach(item => {
                        const btn = document.createElement('button');
                        btn.className = 'text-left px-3 py-2 rounded-md text-gray-500 hover:bg-teal-50 hover:text-teal-700 transition tab-btn text-sm whitespace-nowrap truncate overflow-hidden';
                        btn.innerText = item.name;
                        btn.title = item.name;

                        btn.onclick = () => {
                            document.querySelectorAll('.tab-btn').forEach(b => {
                                b.classList.remove('bg-teal-700', 'text-white', 'font-bold');
                                b.classList.add('text-gray-500');
                                b.classList.remove('hover:text-teal-700');
                            });
                            
                            btn.classList.remove('text-gray-500');
                            btn.classList.add('bg-teal-700', 'text-white', 'font-bold');

                            welcome.classList.add('hidden');
                            viewer.classList.remove('hidden');
                            viewer.src = item.path; 
                        };

                        itemContainer.appendChild(btn);
                    });

                    details.appendChild(summary);
                    details.appendChild(itemContainer);
                    menuContainer.appendChild(details);
                }

            } catch (error) {
                console.error('Error:', error);
                menuContainer.innerHTML = `<span class="text-red-500 text-sm whitespace-nowrap">${error.message}</span>`;
            }
        }

        window.onload = fetchDashboards;
    </script>
</body>
</html>
