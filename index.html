<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상금은동의 대시보드 관리 센터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
        details > summary {
            list-style: none;
        }
        details > summary::-webkit-details-marker {
            display: none;
        }
        details[open] summary .arrow {
            transform: rotate(180deg);
        }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <aside class="w-64 bg-white border-r border-gray-200 shadow-sm flex flex-col h-full z-10">
        <div class="p-5 border-b border-gray-200">
            <h1 class="text-xl font-black text-teal-800">📊 관리 센터</h1>
        </div>
        
        <nav id="tab-menu" class="flex-grow overflow-y-auto p-4 flex flex-col gap-2">
            <span class="text-gray-400 text-sm">목록 불러오는 중...</span>
        </nav>
    </aside>

    <main class="flex-grow flex flex-col h-full relative">
        <div id="welcome-message" class="flex flex-col items-center justify-center h-full text-gray-500">
            <p class="text-5xl mb-4">📂</p>
            <p class="text-lg">좌측 메뉴에서 분석 리포트를 선택해주세요.</p>
            <p class="text-sm mt-2 text-gray-400">파일명에 언더바(_)를 넣으면 자동으로 그룹이 지어집니다.</p>
            <p class="text-sm text-gray-400">예시: 마케팅_1분기리포트.html</p>
        </div>
        <iframe id="viewer" class="hidden w-full h-full border-none"></iframe>
    </main>

    <script>
        // 1. 본인의 정보로 수정해주세요
        const USERNAME = 'Sanggoldsilver'; 
        const REPO = 'dashboards';
        const PATH = 'dashboards'; 

        async function fetchDashboards() {
            const menuContainer = document.getElementById('tab-menu');
            const viewer = document.getElementById('viewer');
            const welcome = document.getElementById('welcome-message');

            try {
                const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/${PATH}`);
                if (!response.ok) throw new Error('데이터를 불러오지 못했습니다.');
                const files = await response.json();

                menuContainer.innerHTML = '';

                const htmlFiles = files.filter(file => file.name.endsWith('.html') && file.name !== 'index.html');

                if (htmlFiles.length === 0) {
                    menuContainer.innerHTML = '<span class="text-red-500 text-sm">불러올 파일이 없습니다.</span>';
                    return;
                }

                // 2. 그룹화 로직 (파일명 기준: 그룹명_파일명.html)
                const groupedFiles = {};
                
                htmlFiles.forEach(file => {
                    let groupName = "기본 대시보드";
                    let displayName = file.name.replace('.html', '');

                    if (displayName.includes('_')) {
                        const parts = displayName.split('_');
                        groupName = parts[0]; 
                        displayName = parts.slice(1).join('_');
                    }

                    if (!groupedFiles[groupName]) {
                        groupedFiles[groupName] = [];
                    }
                    groupedFiles[groupName].push({ name: displayName, path: file.path });
                });

                // 3. 메뉴 렌더링
                for (const [group, items] of Object.entries(groupedFiles)) {
                    const details = document.createElement('details');
                    details.className = 'group';
                    details.open = true; // 탭을 기본으로 펼쳐두려면 이 줄을 유지하세요

                    const summary = document.createElement('summary');
                    summary.className = 'cursor-pointer font-bold text-gray-700 py-2 px-3 bg-gray-100 rounded-lg hover:bg-gray-200 transition flex justify-between items-center';
                    summary.innerHTML = `${group} <span class="arrow transition-transform duration-200 text-xs">▼</span>`;

                    const itemContainer = document.createElement('div');
                    itemContainer.className = 'pl-2 mt-1 flex flex-col gap-1 border-l-2 border-gray-100 ml-2 mb-3';

                    items.forEach(item => {
                        const btn = document.createElement('button');
                        btn.className = 'text-left px-3 py-2 rounded-md text-gray-500 hover:bg-teal-50 hover:text-teal-700 transition tab-btn text-sm';
                        btn.innerText = item.name;

                        btn.onclick = () => {
                            // 모든 버튼 스타일 초기화
                            document.querySelectorAll('.tab-btn').forEach(b => {
                                b.classList.remove('bg-teal-700', 'text-white', 'font-bold');
                                b.classList.add('text-gray-500');
                                b.classList.remove('hover:text-teal-700');
                            });
                            
                            // 클릭한 버튼 스타일 적용
                            btn.classList.remove('text-gray-500');
                            btn.classList.add('bg-teal-700', 'text-white', 'font-bold');

                            // 화면 표시
                            welcome.classList.add('hidden');
                            viewer.classList.remove('hidden');
                            viewer.src = item.path; 
                        };

                        itemContainer.appendChild(btn);
                    });

                    details.appendChild(summary);
                    details.appendChild(itemContainer);
                    menuContainer.appendChild(details);
                }

            } catch (error) {
                console.error('Error:', error);
                menuContainer.innerHTML = `<span class="text-red-500 text-sm">${error.message}</span>`;
            }
        }

        window.onload = fetchDashboards;
    </script>
</body>
</html>
