<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상금은동의 OM 분석 마스터 센터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab {
            background-color: #0F766E; /* Teal 800 */
            color: white;
            font-weight: bold;
        }
        iframe {
            width: 100%;
            height: calc(100vh - 120px);
            border: none;
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col min-h-screen">

    <header class="bg-white border-b border-gray-200 shadow-sm p-4">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-black text-teal-800">📊 OM 분석 포트폴리오</h1>
            <nav id="tab-menu" class="flex flex-wrap gap-2">
                <span class="text-gray-400 text-sm">목록 불러오는 중...</span>
            </nav>
        </div>
    </header>

    <main class="flex-grow">
        <div id="welcome-message" class="flex items-center justify-center h-full text-gray-500 mt-20">
            <div class="text-center">
                <p class="text-4xl mb-4">📂</p>
                <p>상단 탭을 클릭하여 분석 리포트를 확인하세요.</p>
            </div>
        </div>
        <iframe id="viewer" class="hidden"></iframe>
    </main>

    <script>
        // 1. 본인의 정보로 수정해주세요
        const USERNAME = '상금은동_깃허브_아이디'; 
        const REPO = '저장소_이름';
        const PATH = 'dashboards'; // HTML 파일들을 모아둘 폴더 이름 (없으면 '')

        async function fetchDashboards() {
            const menuContainer = document.getElementById('tab-menu');
            const viewer = document.getElementById('viewer');
            const welcome = document.getElementById('welcome-message');

            try {
                // 깃허브 API 호출
                const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/${PATH}`);
                const files = await response.json();

                // 메뉴 초기화
                menuContainer.innerHTML = '';

                // html 파일만 필터링
                const htmlFiles = files.filter(file => file.name.endsWith('.html') && file.name !== 'index.html');

                htmlFiles.forEach((file, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'px-4 py-2 rounded-full border border-teal-600 text-teal-700 text-sm hover:bg-teal-50 transition';
                    btn.innerText = file.name.replace('.html', ''); // 파일명에서 확장자 제거

                    btn.onclick = () => {
                        // 모든 버튼 스타일 초기화
                        document.querySelectorAll('#tab-menu button').forEach(b => b.classList.remove('active-tab'));
                        // 클릭한 버튼 스타일 적용
                        btn.classList.add('active-tab');
                        
                        // iframe 로드 및 표시
                        welcome.classList.add('hidden');
                        viewer.classList.remove('hidden');
                        viewer.src = file.download_url;
                    };

                    menuContainer.appendChild(btn);
                });

                if (htmlFiles.length === 0) {
                    menuContainer.innerHTML = '<span class="text-red-500 text-sm">불러올 파일이 없습니다.</span>';
                }

            } catch (error) {
                console.error('Error:', error);
                menuContainer.innerHTML = '<span class="text-red-500 text-sm">데이터를 불러오지 못했습니다.</span>';
            }
        }

        window.onload = fetchDashboards;
    </script>
</body>
</html>
